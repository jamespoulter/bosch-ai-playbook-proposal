<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&amp;display=swap');
    </style>
  </defs>
  <!-- Solid dark orange background -->
  <circle cx="200" cy="200" r="200" fill="#f46c42"/>
  <!-- Subtle inner ring for depth -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Initials -->
  <text
    x="200"
    y="230"
    font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif"
    font-size="140"
    font-weight="700"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="-4"
  >PE</text>
</svg>
